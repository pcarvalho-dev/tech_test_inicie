# EMQX 5 configuration
# HTTP authentication: every MQTT connection is validated by the backend
authentication = [
  {
    mechanism = password_based
    backend = http
    enable = true
    method = post
    url = "http://backend:3000/api/mqtt/auth"
    connect_timeout = 5s
    pool_size = 8
    headers {
      "Content-Type" = "application/json"
    }
    body {
      username = "${username}"
      password = "${password}"
    }
  }
]
