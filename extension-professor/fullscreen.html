<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Screenshot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    img { max-width: 100%; max-height: 100vh; object-fit: contain; }
    #error { color: #f87171; font-family: sans-serif; font-size: 14px; }
  </style>
</head>
<body>
  <img id="img" />
  <p id="error" style="display:none">Erro ao carregar screenshot.</p>
  <script src="fullscreen.js"></script>
</body>
</html>
